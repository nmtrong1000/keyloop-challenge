openapi: 3.1.0
info:
  title: Intelligent Inventory Dashboard — Mocked Backend
  version: "1.0.0"
  description: >
    Contract for the mocked backend (MSW). Two endpoints, per SRS-SUPPLY:
    a paginated/filterable vehicle list, and append-only action logging
    for aging vehicles. See SDD.md §3 for the domain model this mirrors.
  license:
    name: UNLICENSED

servers:
  - url: /

security: []

paths:
  /vehicles:
    get:
      operationId: getVehicles
      summary: Paginated, filterable vehicle list
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, minimum: 1, maximum: 500, default: 500 }
        - name: make
          in: query
          schema: { type: string }
        - name: model
          in: query
          schema: { type: string }
        - name: ageRange
          in: query
          description: >
            Preset age bucket, per SRS FR. "90-plus" means the SRS's
            ">90 days" aging-stock threshold.
          schema:
            type: string
            enum: ["0-30", "31-60", "61-90", "90-plus"]
        - name: sortBy
          in: query
          description: Column to sort by, applied server-side before pagination. Omitted means unsorted (fixture order).
          schema:
            type: string
            enum: ["make", "model", "intakeDate"]
        - name: sortDir
          in: query
          description: Sort direction. Ignored if sortBy is omitted; defaults to ascending if sortBy is given but sortDir is not.
          schema:
            type: string
            enum: ["asc", "desc"]
            default: asc
      responses:
        "200":
          description: A page of vehicles, plus pagination and aging totals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedVehicles"
        "400":
          description: Invalid query parameter (e.g., unrecognized ageRange value)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /vehicles/{id}/actions:
    get:
      operationId: getVehicleActions
      summary: Full action history for a vehicle, most recent first
      parameters:
        - name: id
          in: path
          required: true
          description: Vehicle VIN
          schema: { type: string }
      responses:
        "200":
          description: The vehicle's action history (empty array if none logged yet)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AgingVehicleAction" }
        "404":
          description: No vehicle exists with the given VIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: postVehicleAction
      summary: Log a new status/action for an aging vehicle (append-only)
      parameters:
        - name: id
          in: path
          required: true
          description: Vehicle VIN
          schema: { type: string }
        - name: X-Correlation-Id
          in: header
          required: false
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, minLength: 1 }
      responses:
        "201":
          description: The newly created action record (prior records unchanged)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgingVehicleAction"
        "400":
          description: Validation error (e.g., empty action)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No vehicle exists with the given VIN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    Vehicle:
      type: object
      required: [vin, make, model, intakeDate]
      properties:
        vin: { type: string }
        make: { type: string }
        model: { type: string }
        intakeDate: { type: string, format: date }
        currentStatus:
          type: string
          description: >
            Denormalized onto the list response for the aging-stock display —
            the most recently logged AgingVehicleAction.action for this
            vehicle, server-computed. Omitted if none logged yet. The
            AgingVehicleAction log itself remains the source of truth
            (SDD §3.2); this is a read-side convenience, not a stored field.

    AgingVehicleAction:
      type: object
      required: [vehicleId, action, timestamp]
      properties:
        vehicleId: { type: string }
        action: { type: string }
        timestamp: { type: string, format: date-time }

    PagedVehicles:
      type: object
      required: [items, totalCount, agingCount]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Vehicle" }
        totalCount:
          type: integer
          description: Count matching the current filter, across all pages (SDD §7 — filter-scoped)
        agingCount:
          type: integer
          description: Global count of aging (>90 day) vehicles, unaffected by any active filter (SDD §7)

    Error:
      type: object
      required: [message]
      properties:
        message: { type: string }
